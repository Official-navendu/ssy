<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Metallic Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F1E8" />
      <stop offset="30%" stop-color="#E2C675" />
      <stop offset="70%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#C7A85A" />
    </linearGradient>

    <!-- Deep Royal Purple Gradient (Body of S) -->
    <linearGradient id="purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5E2B97" />
      <stop offset="50%" stop-color="#3B0A5E" />
      <stop offset="100%" stop-color="#21043D" />
    </linearGradient>

    <!-- Midnight Navy Shadow/Outline for visibility on any background -->
    <filter id="navyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="0.8" flood-color="#0B0D13" flood-opacity="0.95" />
    </filter>
  </defs>

  <!-- Group with drop-shadow filter to ensure visibility on light and dark browser tabs -->
  <g filter="url(#navyShadow)">
    
    <!-- 1. Elegant Letter S (Navy Silhouette for contrast first) -->
    <path 
      d="M71.5,24 C71.5,17.5 64.5,11 52.5,11 C39.5,11 29.5,20.5 29.5,32.5 C29.5,43.5 37.5,48 48.5,52 L57.5,56 C67.5,60.5 73.5,65 73.5,74.5 C73.5,84.5 63.5,91 50.5,91 C37.5,91 27.5,83.5 27.5,71.5 L34.5,71.5 C34.5,79.5 40.5,85 50.5,85 C59.5,85 66.5,86.5 66.5,80.5 C66.5,73 59.5,63 49.5,59 L40.5,55 C30.5,50.5 24.5,45 24.5,32.5 C24.5,21 34.5,13 49.5,13 C61.5,13 71.5,18.5 71.5,24 Z" 
      fill="#0B0D13" 
      stroke="#0B0D13" 
      stroke-width="3" 
      stroke-linejoin="round"
    />
    <!-- Foreground letter S (Purple body with Gold border) -->
    <path 
      d="M71.5,24 C71.5,17.5 64.5,11 52.5,11 C39.5,11 29.5,20.5 29.5,32.5 C29.5,43.5 37.5,48 48.5,52 L57.5,56 C67.5,60.5 73.5,65 73.5,74.5 C73.5,84.5 63.5,91 50.5,91 C37.5,91 27.5,83.5 27.5,71.5 L34.5,71.5 C34.5,79.5 40.5,85 50.5,85 C59.5,85 66.5,86.5 66.5,80.5 C66.5,73 59.5,63 49.5,59 L40.5,55 C30.5,50.5 24.5,45 24.5,32.5 C24.5,21 34.5,13 49.5,13 C61.5,13 71.5,18.5 71.5,24 Z" 
      fill="url(#purple)" 
      stroke="url(#gold)" 
      stroke-width="1.8" 
      stroke-linejoin="round"
    />

    <!-- 2. Tiny Crescent Moon (Vedic Moon of Intuition on Top-Left) -->
    <path 
      d="M26,17 C26,21.4 22.4,25 18,25 C16.2,25 14.5,24.1 13.5,22.8 C15.4,23.3 17.6,22.7 19.1,21.2 C21.0,19.3 21.2,16.5 20.8,14.2 C22.8,15.0 26,15.8 26,17 Z" 
      fill="url(#gold)" 
      stroke="#0B0D13"
      stroke-width="0.8"
    />

    <!-- 3. Small Luxury Tarot Star (8-Pointed Star of Destiny on Top-Right) -->
    <path 
      d="M76,16 L77.5,20.5 L82,19 L79,22 L83.5,23.5 L79,25 L82,28 L77.5,26.5 L76,31 L74.5,26.5 L70,28 L73,25 L68.5,23.5 L73,22 L70,19 L74.5,20.5 Z" 
      fill="url(#gold)" 
      stroke="#0B0D13"
      stroke-width="0.8"
    />

    <!-- 4. Subtle Lotus Base (Spiritual Awakening at Bottom) -->
    <g stroke="#0B0D13" stroke-width="0.8">
      <!-- Outer left/right petals -->
      <path d="M 50,84 C 42,84 38,88 42,90 C 45,90 48,87 50,84 Z" fill="url(#gold)" opacity="0.8" />
      <path d="M 50,84 C 58,84 62,88 58,90 C 55,90 52,87 50,84 Z" fill="url(#gold)" opacity="0.8" />
      
      <!-- Inner left/right petals -->
      <path d="M 50,82 C 45,82 42,85 45,88 C 47,88 49,85 50,82 Z" fill="url(#gold)" />
      <path d="M 50,82 C 55,82 58,85 55,88 C 53,88 51,85 50,82 Z" fill="url(#gold)" />
      
      <!-- Center main petal -->
      <path d="M 50,78 C 48,81 47,85 50,89 C 53,85 52,81 50,78 Z" fill="url(#gold)" />
      
      <!-- Base curve -->
      <path d="M36,89 C43,92 57,92 64,89 C57,90 43,90 36,89 Z" fill="#0B0D13" />
    </g>

  </g>
</svg>
